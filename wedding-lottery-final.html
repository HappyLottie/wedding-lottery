<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Lucky Draw</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: #5E3628;
      background: #FAF3E8;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: visible;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.64), rgba(250,243,232,0.2) 38%, rgba(231,184,117,0.28)),
        #FAF3E8;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 8px 24px rgba(94, 54, 40, 0.08);
      margin-bottom: 20px;
      letter-spacing: 0.22em;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(50px, 7vw, 86px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 16px;
      font-size: clamp(19px, 2.1vw, 28px);
      opacity: 0.74;
    }

    .card {
      position: relative;
      width: min(920px, 100%);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.70);
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: 0 30px 80px rgba(94, 54, 40, 0.16);
      text-align: center;
      padding: clamp(34px, 5vw, 58px);
      overflow: hidden;
    }

    .gift {
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: rgba(231, 184, 117, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: #B56B45;
    }

    .label {
      font-size: 20px;
      opacity: 0.72;
      margin-bottom: 12px;
    }

    .number {
      font-size: clamp(112px, 17vw, 196px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0;
      color: #B56B45;
      text-shadow: 0 10px 24px rgba(181,107,69,0.16);
      font-variant-numeric: tabular-nums;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .number.rolling { transform: scale(1.04); opacity: 0.88; }
    .number.revealing { transform: scale(1.15); transition: transform 0.5s ease; }

    .controls {
      margin: 0 auto;
      width: min(520px, 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      text-align: left;
    }

    .settings-area {
      position: relative;
      z-index: 2;
      width: min(920px, calc(100% - 64px));
      margin: 0 auto;
      padding: 72px 0 96px;
      border-top: 1px solid rgba(181,107,69,0.14);
    }

    .settings-title {
      margin-bottom: 14px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.56;
      text-align: center;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.66;
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(181,107,69,0.24);
      border-radius: 999px;
      padding: 16px 20px;
      color: #5E3628;
      background: rgba(255,255,255,0.74);
      font: inherit;
      font-size: 20px;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
    }

    .field input:focus {
      border-color: rgba(181,107,69,0.58);
      box-shadow: 0 0 0 4px rgba(181,107,69,0.10);
    }

    .buttons {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 18px 44px;
      font-size: 21px;
      font-weight: 800;
      font-family: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .draw-btn {
      background: #B56B45;
      color: white;
      box-shadow: 0 14px 28px rgba(181,107,69,0.28);
    }

    .reset-btn,
    .set-btn {
      background: rgba(255,255,255,0.62);
      color: #6A3E2D;
      border: 1px solid rgba(181,107,69,0.28);
    }

    .set-btn { padding-inline: 28px; }

    .status {
      margin-top: 26px;
      font-size: 17px;
      opacity: 0.68;
    }

    .winner-area {
      width: min(920px, 100%);
      margin-top: 26px;
    }

    .winner-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .winner-list {
      min-height: 104px;
      border-radius: 24px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.68);
      box-shadow: 0 12px 32px rgba(94,54,40,0.08);
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .empty {
      width: 100%;
      text-align: center;
      opacity: 0.55;
      padding: 26px 0;
      font-size: 18px;
    }

    .winner-pill {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 8px 18px rgba(94,54,40,0.08);
      font-size: 20px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      animation: popIn 0.25s ease-out;
    }

    .confetti {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #E7B875;
      pointer-events: none;
      animation: confettiBurst 0.8s ease-out forwards;
    }

    @keyframes confettiBurst {
      from { transform: translate(0, 0) scale(1); opacity: 1; }
      to { transform: translate(var(--x), var(--y)) scale(0.4); opacity: 0; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 640px) {
      .content { padding: 28px 18px; justify-content: flex-start; }
      .card { border-radius: 24px; }
      .controls { grid-template-columns: 1fr; }
      .settings-area { width: calc(100% - 36px); padding: 56px 0 72px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content">
      <header class="header">
        <div class="badge"><span>&hearts;</span><span>WEDDING LUCKY DRAW</span></div>
        <h1>Wedding Lucky Draw</h1>
        <div class="subtitle">Sending a little extra luck to everyone here today</div>
      </header>

      <section class="card" id="card">
        <div class="gift">&hearts;</div>
        <div class="label">Winning Number</div>
        <div id="number" class="number">---</div>

        <div class="buttons">
          <button id="drawBtn" class="draw-btn">Start Draw</button>
          <button id="resetBtn" class="reset-btn">Reset</button>
        </div>

        <div id="status" class="status">Drawn 0 of 230 guests - 230 remaining</div>
      </section>

      <section class="winner-area">
        <div class="winner-title">Winner List</div>
        <div id="winnerList" class="winner-list">
          <div class="empty">No winners yet</div>
        </div>
      </section>

    </section>

    <section class="settings-area" aria-label="Draw settings">
      <div class="settings-title">Private setup</div>
      <div class="controls">
        <div class="field">
          <label for="guestCount">Guests in the draw</label>
          <input id="guestCount" type="number" min="1" max="999" step="1" value="230" inputmode="numeric" />
        </div>
        <button id="setGuestBtn" class="set-btn" type="button">Set</button>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_GUEST_COUNT = 230;

    let winners = [];
    let totalGuests = DEFAULT_GUEST_COUNT;
    let isDrawing = false;
    let isRevealing = false;
    let rollTimer = null;

    const numberEl = document.getElementById("number");
    const guestCountEl = document.getElementById("guestCount");
    const setGuestBtn = document.getElementById("setGuestBtn");
    const drawBtn = document.getElementById("drawBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");
    const winnerListEl = document.getElementById("winnerList");
    const cardEl = document.getElementById("card");

    function padNumber(num) {
      return String(num).padStart(3, "0");
    }

    function getAvailableNumbers() {
      const winnerSet = new Set(winners);
      return Array.from({ length: totalGuests }, (_, i) => i + 1).filter(num => !winnerSet.has(num));
    }

    function getWinner() {
      const availableNumbers = getAvailableNumbers();
      return availableNumbers[Math.floor(Math.random() * availableNumbers.length)];
    }

    function createConfetti() {
      const colors = ["#E7B875", "#B56B45", "#F3C6B8", "#FFFFFF"];

      for (let i = 0; i < 22; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.background = colors[i % colors.length];
        dot.style.setProperty("--x", `${(Math.random() - 0.5) * 620}px`);
        dot.style.setProperty("--y", `${(Math.random() - 0.5) * 420}px`);
        cardEl.appendChild(dot);

        setTimeout(() => dot.remove(), 850);
      }
    }

    function updateStatus() {
      const remaining = Math.max(totalGuests - winners.length, 0);
      statusEl.textContent = `Drawn ${winners.length} of ${totalGuests} guests - ${remaining} remaining`;
    }

    function renderWinners() {
      winnerListEl.innerHTML = "";

      if (winners.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No winners yet";
        winnerListEl.appendChild(empty);
        return;
      }

      winners.forEach(winner => {
        const pill = document.createElement("div");
        pill.className = "winner-pill";
        pill.textContent = padNumber(winner);
        winnerListEl.appendChild(pill);
      });
    }

    function drawWinner() {
      const availableNumbers = getAvailableNumbers();
      if (isDrawing || isRevealing || availableNumbers.length === 0) return;

      isDrawing = true;
      drawBtn.disabled = true;
      setGuestBtn.disabled = true;
      guestCountEl.disabled = true;
      drawBtn.textContent = "Drawing...";

      let counter = 0;
      rollTimer = setInterval(() => {
        const currentAvailable = getAvailableNumbers();
        const preview = currentAvailable[Math.floor(Math.random() * currentAvailable.length)];
        numberEl.textContent = padNumber(preview);
        numberEl.classList.toggle("rolling");
        counter++;

        if (counter >= 28) {
          clearInterval(rollTimer);

          const winner = getWinner();
          numberEl.textContent = padNumber(winner);
          numberEl.classList.remove("rolling");
          numberEl.classList.add("revealing");

          isRevealing = true;
          createConfetti();

          setTimeout(() => {
            winners.unshift(winner);
            isDrawing = false;
            isRevealing = false;
            numberEl.classList.remove("revealing");
            drawBtn.disabled = false;
            setGuestBtn.disabled = false;
            guestCountEl.disabled = false;
            drawBtn.textContent = getAvailableNumbers().length === 0 ? "All Drawn" : "Start Draw";
            if (getAvailableNumbers().length === 0) drawBtn.disabled = true;
            updateStatus();
            renderWinners();
          }, 500);
        }
      }, 70);
    }

    function resetLottery() {
      if (rollTimer) clearInterval(rollTimer);
      winners = [];
      isDrawing = false;
      isRevealing = false;
      numberEl.textContent = "---";
      numberEl.classList.remove("rolling", "revealing");
      drawBtn.disabled = false;
      setGuestBtn.disabled = false;
      guestCountEl.disabled = false;
      drawBtn.textContent = "Start Draw";
      updateStatus();
      renderWinners();
    }

    function applyGuestCount() {
      const nextTotal = Math.max(1, Math.min(999, Math.floor(Number(guestCountEl.value) || DEFAULT_GUEST_COUNT)));
      totalGuests = nextTotal;
      guestCountEl.value = nextTotal;
      resetLottery();
    }

    guestCountEl.addEventListener("change", applyGuestCount);
    setGuestBtn.addEventListener("click", applyGuestCount);
    drawBtn.addEventListener("click", drawWinner);
    resetBtn.addEventListener("click", resetLottery);
    updateStatus();
    renderWinners();
  </script>
</body>
</html>
